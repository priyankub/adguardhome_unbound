name: Deploy to GitHub Container Registry

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually trigger a build from the UI

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up QEMU for emulation so an x86 runner can compile ARM64 binaries
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx for multi-platform image manifest tagging
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push simultaneously for both architectures
      - name: Build and push Multi-Arch Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/adguardhome_unbound:latest